name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Build Binaries
        run: |
          mkdir -p dist
          
          echo "Building for Linux..."
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/go-custom-ddns-linux-amd64 main.go
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dist/go-custom-ddns-linux-arm64 main.go
          
          echo "Building for macOS..."
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dist/go-custom-ddns-darwin-amd64 main.go
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dist/go-custom-ddns-darwin-arm64 main.go
          
          echo "Building for Windows..."
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/go-custom-ddns-windows-amd64.exe main.go

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false